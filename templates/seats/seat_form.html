{% extends "base.html" %}
{% block title %}{% if action == "create" %}Tambah Kursi{% else %}Update Kursi{% endif %} | TikTakTuk{% endblock %}
{% block content %}
<section class="panel">
    <h1>{% if action == "create" %}Tambah Kursi{% else %}Update Kursi{% endif %}</h1>
    <form class="stack" method="post">
        {% csrf_token %}
        <label>Venue
            <select name="venue" required>
                <option value="">Pilih venue</option>
                {% for venue in venues %}
                    {# FIX: venue_id & venue_name #}
                    <option value="{{ venue.venue_id }}" {% if seat.venue_id == venue.venue_id %}selected{% endif %}>{{ venue.venue_name }} - {{ venue.city }}</option>
                {% endfor %}
            </select>
        </label>
        <label>Section
            <input name="section" value="{{ seat.section|default:'' }}" required>
        </label>
        <label>Baris
            {# FIX: name="row_number" dan key row_number #}
            <input name="row_number" value="{{ seat.row_number|default:'' }}" required>
        </label>
        <label>No. Kursi
            {# FIX: name="seat_number" dan key seat_number #}
            <input name="seat_number" value="{{ seat.seat_number|default:'' }}" required>
        </label>
        <div class="actions">
            <button class="primary" type="submit">{% if action == "create" %}Tambah{% else %}Simpan{% endif %}</button>
            <a class="button secondary" href="{% url 'seat_list' %}">Batal</a>
        </div>
    </form>
</section>
{% endblock %}
