{% extends "base.html" %}
{% block title %}Hapus Venue | TikTakTuk{% endblock %}
{% block content %}
<section class="panel">
    <h1>Hapus Venue</h1>
    <p>Venue ID: {{ venue.venue_id }}</p>
    <p>Nama: {{ venue.venue_name }}</p>
    <p>Kota: {{ venue.city }}</p>
    <p>Anda yakin ingin menghapus venue ini?</p>
    <form class="actions" method="post">
        {% csrf_token %}
        <button class="danger" type="submit">Hapus</button>
        <a class="button secondary" href="{% url 'venue_list' %}">Batal</a>
    </form>
</section>
{% endblock %}
