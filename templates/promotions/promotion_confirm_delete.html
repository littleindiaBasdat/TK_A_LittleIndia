{% extends "base.html" %}
{% block title %}Delete Promo | TikTakTuk{% endblock %}
{% block content %}
<section class="panel">
    <h1>Delete Promo</h1>
    <p>Anda yakin ingin menghapus promo {{ promotion.promo_code }}?</p>
    <form class="actions" method="post">
        {% csrf_token %}
        <button class="danger" type="submit">Hapus</button>
        <a class="button secondary" href="{% url 'promotion_list' %}">Batal</a>
    </form>
</section>
{% endblock %}
