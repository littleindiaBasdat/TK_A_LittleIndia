{% extends "base.html" %}
{% block title %}{% if action == "create" %}Buat Promo{% else %}Update Promo{% endif %} | TikTakTuk{% endblock %}
{% block content %}
<section class="panel">
    <h1>{% if action == "create" %}Buat Promo{% else %}Update Promo{% endif %}</h1>
    <form class="stack" method="post">
        {% csrf_token %}
        <label>Kode Promo
            <input name="promo_code" value="{{ promotion.promo_code|default:'' }}" required>
        </label>
        <label>Tipe Diskon
            <select name="discount_type" required>
                <option value="percent" {% if promotion.discount_type == "percent" %}selected{% endif %}>Persentase</option>
                <option value="nominal" {% if promotion.discount_type == "nominal" %}selected{% endif %}>Nominal</option>
            </select>
        </label>
        <label>Nilai Diskon
            <input type="number" step="0.01" min="0.01" name="discount_value" value="{{ promotion.discount_value|default:'' }}" required>
        </label>
        <label>Tanggal Mulai
            <input type="date" name="start_date" value="{{ promotion.start_date|date:'Y-m-d' }}" required>
        </label>
        <label>Tanggal Berakhir
            <input type="date" name="end_date" value="{{ promotion.end_date|date:'Y-m-d' }}" required>
        </label>
        <label>Batas Penggunaan
            <input type="number" min="1" name="usage_limit" value="{{ promotion.usage_limit|default:'' }}" required>
        </label>
        <div class="actions">
            <button class="primary" type="submit">{% if action == "create" %}Buat{% else %}Simpan{% endif %}</button>
            <a class="button secondary" href="{% url 'promotion_list' %}">Batal</a>
        </div>
    </form>
</section>
{% endblock %}
