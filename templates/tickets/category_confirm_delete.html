{% extends "base.html" %}
{% block title %}Delete Kategori Tiket | TikTakTuk{% endblock %}
{% block content %}
<section class="panel">
    <h1>Delete Kategori Tiket</h1>
    <p>Category ID: {{ category.id }}</p>
    <p>Category Name: {{ category.name }}</p>
    <form class="actions" method="post">
        {% csrf_token %}
        <button class="danger" type="submit">Confirm Deletion</button>
        <a class="button secondary" href="{% url 'ticket_category_list' %}">Cancel</a>
    </form>
</section>
{% endblock %}
